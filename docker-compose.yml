services:
  slackbot:
    container_name: slackbot
    image: ekolp/slackbot:dev
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env

  db:
    container_name: db
    image: percona/percona-server:8.0.39
    restart: always
    platform: linux/amd64
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - my-db:/var/lib/mysql
      - ./slackbotdb.sql:/docker-entrypoint-initdb.d/1.sql # Seeds the database schema
    healthcheck:
      test: ["CMD-SHELL", "netstat -ltn | grep -c 3306"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  my-db:
