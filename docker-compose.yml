services:
  slackbot:
    container_name: slackbot
    image: ekolp/slackbot:latest
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      liquibase:
        condition: service_completed_successfully
    ports:
      - "${HEALTH_CHECK_PORT:-8080}:${HEALTH_CHECK_PORT:-8080}"
    environment:
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN}
      ALLOWED_SLACK_USER_ID: ${ALLOWED_SLACK_USER_ID}
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      HEALTH_CHECK_PORT: ${HEALTH_CHECK_PORT:-8080}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${HEALTH_CHECK_PORT:-8080}/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  liquibase:
    container_name: liquibase
    build:
      context: .
      dockerfile: Dockerfile.liquibase
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./migrations:/liquibase/changelog
    environment:
      LIQUIBASE_COMMAND_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE}
      LIQUIBASE_COMMAND_USERNAME: ${MYSQL_USER}
      LIQUIBASE_COMMAND_PASSWORD: ${MYSQL_PASSWORD}
      LIQUIBASE_COMMAND_CHANGELOG_FILE: changelog/changelog-master.xml
    entrypoint: ["sh", "-c", "sleep 10 && /liquibase/docker-entrypoint.sh update"]

  db:
    container_name: db
    image: percona/percona-server:8.0.39
    restart: always
    platform: linux/amd64
    command:
      - --log-error-verbosity=1
      - --default-authentication-plugin=caching_sha2_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - my-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  my-db:
