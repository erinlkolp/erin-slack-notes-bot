services:
  slackbot:
    container_name: slackbot
    image: ekolp/slackbot:dev
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      SLACK_BOT_TOKEN: ""
      SLACK_SIGNING_SECRET: ""
      SLACK_APP_TOKEN: ""
      ALLOWED_SLACK_USER_ID: "" # Your Slack user ID (e.g. U12345678)
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: password
      MYSQL_DATABASE: slack_notes

  db:
    container_name: db
    image: percona/percona-server:8.0.39
    restart: always
    platform: linux/amd64
    environment:
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - my-db:/var/lib/mysql
      - ./slackbotdb.sql:/docker-entrypoint-initdb.d/1.sql # Seeds the database schema
    healthcheck:
      test: ["CMD-SHELL", "netstat -ltn | grep -c 3306"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  my-db: